<!DOCTYPE html>
<html>
<head>
<title>Update About</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:40px;
}

h2{
    text-align:center;
}

form{
    width:400px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:6px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    background:#222;
    color:white;
    border:none;
}

img{
    display:block;
    margin:auto;
    margin-bottom:10px;
    border-radius:5px;
}

</style>

</head>

<body>

<h2>Update Information</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<input type="text" name="name" value="{{ data.name }}">

<input type="text" name="Address" value="{{ data.Address }}">

<input type="number" name="Age" value="{{ data.Age }}">

<input type="date" name="date_of_birth" value="{{ data.date_of_birth|date:'Y-m-d' }}">

<input type="text" name="Education" value="{{ data.Education }}">

<input type="text" name="department" value="{{ data.department }}">

<img src="{{ data.image.url }}" width="80">

<input type="file" name="image">

<button type="submit">Update</button>

</form>

</body>
</html>
